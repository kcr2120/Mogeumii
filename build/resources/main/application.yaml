# spring boot 핵심 설정 파일 : application.yaml


spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver # 1. DB 통신 드라이버 : 자바와 mysql을 연결해주는 통신 케이블 역할

    # 2. DB 주소 (url) : 연결할 DB의 위치와 옵션 설정
    # - localhost:3306 : 내 컴퓨터에 설치된 mysql의 기본 포트
    # - /mogeumii : 디비버에서 만든 데이터베이스 이름
    # - serverTimezone = Asia/Seoul : 한국 시간을 DB 시간을 맞춤
    # - characterEncoding=UTF-8 : 한글 깨지지 않도록
    url: jdbc:mysql://localhost:3306/mogeumii?serverTimezone=Asia/Seoul&ccharacterEncoding=UTF-8

    username: root # 3. DB 접속 계정 정보

    password: # 4. DB 접속 비밀번호. 없으면 빈칸

  jpa:
    hibernate:
      # 5. 테이블 자동 생성 (ddl-auto)
      # update : 자바 코드를 작성하면 스프링이 알아서 DB에 테이블을 만들거나 수정해줌
      ddl-auto : update

    show-sql: true # 6. sql 로그 출력 : 스프링이 DB에 명령 내릴 때, 어떤 sql쿼리를 쓰는지 콘솔 창에 보여줌 (개발용 필수)

    properties:
      hibernate:
        format_sql: true # 7. sql 정렬 : 콘솔에 출력되는 쿼리를 줄바꿈해서 보여줌

